name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'nfcc_mobile/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'nfcc_mobile/**'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nfcc_mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        continue-on-error: true
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfcc-android-release-apk
          path: nfcc_mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: nfcc_mobile/build/app/outputs/flutter-apk/app-release.apk
