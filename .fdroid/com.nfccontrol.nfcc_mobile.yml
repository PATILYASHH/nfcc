Categories:
  - System
  - Connectivity
License: MIT
AuthorName: Yash Patil
AuthorWebSite: https://yashpatil.vercel.app
WebSite: https://patilyashh.github.io/nfcc/
SourceCode: https://github.com/PATILYASHH/nfcc
IssueTracker: https://github.com/PATILYASHH/nfcc/issues
Changelog: https://github.com/PATILYASHH/nfcc/releases
Donate: https://github.com/sponsors/PATILYASHH

AutoName: NFCC

Description: |-
  NFCC turns an NFC tag into a universal remote. One tap can fire a routine
  (Wi-Fi, Bluetooth, time, weekday conditions), log habits (water, coffee,
  IN/OUT), complete daily TODOs with streak tracking, and — with the optional
  PC companion over local Wi-Fi — launch apps, control media, or lock your
  workstation.

  All data stays on the device in a local SQLite database. No cloud account,
  no analytics, no tracking. MIT licensed.

RepoType: git
Repo: https://github.com/PATILYASHH/nfcc

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    subdir: nfcc_mobile
    sudo:
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
      - update-java-alternatives -a
    gradle:
      - yes
    srclibs:
      - flutter@3.38.9
    rm:
      - nfcc_mobile/ios
      - nfcc_mobile/macos
      - nfcc_mobile/windows
      - nfcc_mobile/linux
      - nfcc_mobile/web
    prebuild:
      - export PUB_CACHE="$$PWD$$/.pub-cache"
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build:
      - export PUB_CACHE="$$PWD$$/.pub-cache"
      - $$flutter$$/bin/flutter build apk --release --no-tree-shake-icons
    output: build/app/outputs/flutter-apk/app-release.apk
    novcheck: true

