name: nfcc_mobile
description: "NFCC - NFC Control: Automate your phone and PC with NFC tags"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # NFC
  nfc_manager: ^4.0.0

  # State management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^11.3.0

  # Installed apps
  installed_apps: ^1.5.0

  # Utilities
  uuid: ^4.3.3

  # Icons
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  http: ^1.6.0
  shared_preferences: ^2.5.5
  sqflite_common_ffi_web: ^1.1.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
